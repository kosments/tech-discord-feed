name: Tech RSS Bot

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rss-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: vx.x.x

      - name: Run RSS Bot
        env:
          DISCORD_WEBHOOK_URL_AI: ${{ secrets.DISCORD_WEBHOOK_URL_AI }}
          DISCORD_WEBHOOK_URL_CLOUD: ${{ secrets.DISCORD_WEBHOOK_URL_CLOUD }}
          DISCORD_WEBHOOK_URL_KUBERNETES: ${{ secrets.DISCORD_WEBHOOK_URL_KUBERNETES }}
          DISCORD_WEBHOOK_URL_CNCF: ${{ secrets.DISCORD_WEBHOOK_URL_CNCF }}
          DISCORD_WEBHOOK_URL_OBSERVABILITY: ${{ secrets.DISCORD_WEBHOOK_URL_OBSERVABILITY }}
          DISCORD_WEBHOOK_URL_SECURITY: ${{ secrets.DISCORD_WEBHOOK_URL_SECURITY }}
          DISCORD_WEBHOOK_URL_ENGINEERING: ${{ secrets.DISCORD_WEBHOOK_URL_ENGINEERING }}
          DISCORD_WEBHOOK_URL_OSS: ${{ secrets.DISCORD_WEBHOOK_URL_OSS }}
        run: deno run --allow-net --allow-env --allow-read --allow-write src/bot.ts
